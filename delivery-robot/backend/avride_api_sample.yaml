          description: Internal Server Error
      summary: Close lid
  '/api/v1/orders/{orderId}/open':
    post:
      feature: LoadOrder
      operationId: open
      parameters:
        - description: Order UUID
          example: ddf6f55b-e8e7-463a-bf71-0fa33711d833
          in: path
          name: orderId
          required: true
          schema:
            description: Order UUID
            examples:
              - ddf6f55b-e8e7-463a-bf71-0fa33711d833
